<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dynamic To-Do List</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Three.js Canvas Container -->
    <div id="canvas-container"></div>

    <div class="container main-content mt-5">
        <div class="row justify-content-center">
            <!-- To-Do List Section -->
            <div class="col-lg-7 mb-4">
                <div class="glass-panel p-4 h-100">
                    <h1 class="mb-4 fw-bold text-gradient">My Tasks</h1>
                    
                    <form id="todo-form" class="mb-4">
                        <div class="mb-3">
                            <input type="text" id="task-input" class="form-control custom-input rounded" placeholder="What needs to be done?" required autocomplete="off" style="border-radius: 10px !important;">
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col-md-4">
                                <select id="task-priority" class="form-select custom-input" required style="border-radius: 10px !important;">
                                    <option value="" disabled selected>Priority</option>
                                    <option value="High">High</option>
                                    <option value="Medium">Medium</option>
                                    <option value="Low">Low</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <select id="task-type" class="form-select custom-input" required style="border-radius: 10px !important;">
                                    <option value="" disabled selected>Type</option>
                                    <option value="Work">Work</option>
                                    <option value="Personal">Personal</option>
                                    <option value="Errand">Errand</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <input type="time" id="task-time" class="form-control custom-input" required style="border-radius: 10px !important;">
                            </div>
                        </div>
                        <button class="btn btn-custom w-100" type="submit" style="border-radius: 10px;">Add Task</button>
                    </form>

                    <ul id="todo-list" class="list-group">
                        <!-- Tasks will be injected here via JavaScript -->
                    </ul>
                </div>
            </div>

            <!-- Visualization Section (D3.js) -->
            <div class="col-lg-5 mb-4">
                <div class="glass-panel p-4 h-100 d-flex flex-column align-items-center justify-content-center">
                    <h3 class="mb-3 fw-bold text-gradient-alt">Progress</h3>
                    <div id="d3-chart-container" class="chart-container">
                        <!-- D3 Chart will be drawn here -->
                    </div>
                    <div class="mt-3 text-center">
                        <span class="badge rounded-pill bg-success me-2" id="completed-badge">0 Completed</span>
                        <span class="badge rounded-pill bg-warning text-dark" id="pending-badge">0 Pending</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <!-- Custom Scripts -->
    <script src="three-scene.js"></script>
    <script src="d3-charts.js"></script>
    <script src="app.js"></script>
</body>
</html>
