<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Market Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-primary" href="#">StockDash</a>
            <div class="d-flex">
                <input class="form-control me-2 bg-dark text-light border-secondary" type="search" placeholder="Search Ticker (e.g., AAPL)" aria-label="Search" id="ticker-input">
                <button class="btn btn-outline-primary" type="button" id="search-btn">Search</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row g-4">
            <!-- Left Column: D3 Chart & Data -->
            <div class="col-lg-8">
                <!-- D3 Chart Card -->
                <div class="card bg-secondary bg-opacity-25 border-0 shadow-lg mb-4 glass-card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="card-title fw-bold mb-0" id="chart-title">Stock Price History: AAPL</h5>
                            <div class="btn-group" role="group" aria-label="Timeframe">
                                <button type="button" class="btn btn-sm btn-outline-secondary active" data-range="1M">1M</button>
                                <button type="button" class="btn btn-sm btn-outline-secondary" data-range="6M">6M</button>
                                <button type="button" class="btn btn-sm btn-outline-secondary" data-range="1Y">1Y</button>
                            </div>
                        </div>
                        <div id="d3-chart-container" class="w-100" style="height: 400px; position: relative;">
                            <!-- D3 Chart will be injected here -->
                        </div>
                    </div>
                </div>

                <!-- Market Data Table -->
                <div class="card bg-secondary bg-opacity-25 border-0 shadow-lg glass-card">
                    <div class="card-body">
                        <h5 class="card-title fw-bold mb-3">Top Movers</h5>
                        <div class="table-responsive">
                            <table class="table table-dark table-hover table-borderless align-middle" id="market-table">
                                <thead>
                                    <tr class="text-secondary">
                                        <th>Ticker</th>
                                        <th>Price</th>
                                        <th>Change</th>
                                        <th>Volume</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Table rows injected via jQuery -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Three.js Scene & Info -->
            <div class="col-lg-4">
                <!-- Three.js Card -->
                <div class="card bg-secondary bg-opacity-25 border-0 shadow-lg mb-4 glass-card overflow-hidden">
                    <div class="card-body p-0 position-relative">
                        <h5 class="card-title fw-bold p-3 mb-0 position-absolute z-3 text-white">Market Sentiment Globe</h5>
                        <div id="three-container" class="w-100" style="height: 350px; background: #000;">
                            <!-- Three.js Scene will be injected here -->
                        </div>
                    </div>
                </div>

                <!-- Live Updates Card -->
                <div class="card bg-secondary bg-opacity-25 border-0 shadow-lg glass-card h-100">
                    <div class="card-body">
                        <h5 class="card-title fw-bold text-info mb-3">Live Updates</h5>
                        <ul class="list-group list-group-flush bg-transparent" id="live-updates-list">
                            <!-- Updates injected here via jQuery -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS Files -->
    <script src="d3-charts.js"></script>
    <script src="three-scene.js"></script>
    <script src="app.js"></script>
</body>
</html>
